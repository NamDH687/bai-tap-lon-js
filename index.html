<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>src = "script.js"</script>
    <style>
        .top-bar{
            background: black;
            color: white;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            font-size: 14px
        }
        .top-right{
            display: flex;
            gap: 20px;
            align-items:center
        }
        .top-right a{
           color: white;
           text-decoration:none; 
        }
        .policy {
            position: relative
        }
        .dropdown{
            position: absolute;
            top:100%;
            right:0;
            width:250px;
            background:white;
            display:none;
            flex-direction: column;
            font-size: 17px
        }
        .dropdown a{
            color:black;
            padding:10px;
            border-bottom:0px solid #ccc;
            display:flex;
            align-center: center;
            gap:10px
        }
        .dropdown img{
            width:15px;
            height:15px
        }
        .policy:hover .dropdown{
            display:flex
        }
    </style>
</head>
<body>
    <div class="top-bar">

        </div>
        <div class="top-right">
