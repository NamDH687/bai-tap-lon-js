<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP GAME BẢN QUYỀN CHÍNH HÃNG</title>
    <script>src = "script.js"</script>
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background-image: url('https://khoinguonsangtao.vn/wp-content/uploads/2022/10/hinh-dep-cho-powerpoint-chuyen-nghiep-nhat.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
        }    
        .top-bar{
            background: black;
            color: white;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            font-size: 14px
        }
        .top-right{
            display: flex;
            gap: 20px;
            align-items:center
        }
        .top-right a{
           color: white;
           text-decoration:none; 
           transition:0.2s;
        }
        .menu{
            background: rgba(23,26,33,0.95);

            display:flex;
            align-items:center;

            gap:40px;

            padding:0 50px;
            height:70px;
        }

        .menu-item{
            position:center;
        }

        .menu-item > a{
            color:white;
            text-decoration:none;

            font-size:20px;
            font-weight:bold;

            display:block;
            padding:20px 0;

            transition:0.2s;
        }

        .menu-item > a:hover{
            color:#1a9fff;
            border-bottom:4px solid #1a9fff;
        }

        .policy {
            position: relative
        }
        .dropdown{
            position:absolute;
            top:100%;
            left:0;
            width:220px;
            background:rgba(30, 35, 45, 0.8);
            display:none;
            flex-direction:column;
            z-index:999;
        }
        .dropdown a{
            color:white;
            text-decoration:none;
            padding:15px 20px;
            display:block;
        }
        .dropdown img{
            width:15px;
            height:15px
        }
        .policy:hover .dropdown{
            display:flex
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div>
            SHOP GAME BẢN QUYỀN CHÍNH HÃNG
        </div>
        <div class="top-right">
            <a href="">Về tên web |</a>
            <div class="policy">
                <a href=" ">Chính sách ▾|</a>
                <div class="dropdown">
                    <a href="">Chính sách bảo hành</a>
                    <a href="">Chính sách thanh toán</a>
                    <a href="">Chính sách hoàn tiền</a>
                    <a href="">Chính sách đổi trả</a>
                    <a href="">Chính sách bảo mật</a>
                </div>
            </div>
            <div class="policy">
                <a href=" ">Thông tin liên hệ ▾|</a>
                <div class="dropdown">
                    <a href="">
                        <img src="https://cdn.tgdd.vn/2020/03/GameApp/Facebook-200x200.jpg">
                        Facebook
                    </a>
                    <a href="">
                        <img src="https://cdn.tgdd.vn/2020/03/GameApp/Instagram-200x200.jpg">
                        Instagram
                    </a>
                    <a href="">
                        <img src="https://p16-tiktokcdn-com.akamaized.net/obj/tiktok-obj/c793ec5430b28c9d157f34562a0596b9">
                        TikTok
                    </a>
                    <a href="">
                        <img src="https://play-lh.googleusercontent.com/rFIOt4fDSCgJh_FkHU2qP8YiZUUhfVoKoNfQFbPEM-Wl8zuyuwn7vzkEx_XMh5B6FfO3=w480-h960-rw">
                        Zalo
                    </a>
                </div>
            </div>
        </div>
    </div>

<div class="menu">

    <div class="policy menu-item">

        <a href="">CỬA HÀNG</a>

        <div class="dropdown">
            <a href="">Trang chủ</a>
            <a href="">Khám phá</a>
            <a href="">Tin tức</a>
        </div>

    </div>

    <div class="menu-item">
        <a href="">CỘNG ĐỒNG</a>

    <div class="menu-item">

    </div>

</div>

</body>
</html>
